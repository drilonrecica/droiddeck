name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version tag
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$version" != "$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version." >&2
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          rm -f droiddeck-*.tgz SHA256SUMS
          pnpm pack
          package_file="droiddeck-${version}.tgz"
          test -f "$package_file"
          sha256sum "$package_file" > SHA256SUMS
          echo "PACKAGE_FILE=$package_file" >> "$GITHUB_ENV"
          echo "PACKAGE_SHA256=$(cut -d ' ' -f 1 SHA256SUMS)" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$PACKAGE_FILE" SHA256SUMS --clobber
          else
            gh release create "$tag" "$PACKAGE_FILE" SHA256SUMS \
              --title "DroidDeck ${tag#v}" \
              --notes "DroidDeck ${tag#v} release." \
              --verify-tag
          fi

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap update."
            exit 0
          fi

          version="${GITHUB_REF_NAME#v}"
          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/drilonrecica/homebrew-droiddeck.git" "$tap_dir"
          mkdir -p "$tap_dir/Formula"

          cat > "$tap_dir/Formula/droiddeck.rb" <<RUBY
          class Droiddeck < Formula
            desc "Terminal dashboard and CLI command center for native Android development"
            homepage "https://github.com/drilonrecica/droiddeck"
            url "https://github.com/drilonrecica/droiddeck/releases/download/v${version}/droiddeck-${version}.tgz"
            sha256 "${PACKAGE_SHA256}"
            license "MIT"

            depends_on "node" => :build
            depends_on "oven-sh/bun/bun"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink libexec.glob("bin/*")
            end

            test do
              assert_match "Usage:", shell_output("#{bin}/droiddeck --help")
            end
          end
          RUBY

          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/droiddeck.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap formula is already up to date."
            exit 0
          fi
          git commit -m "droiddeck ${version}"
          git push
